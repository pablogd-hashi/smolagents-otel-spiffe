# OpenTelemetry Collector — central pipeline for the demo.
#
# Three pipelines, fanning out to Jaeger (traces), Prometheus (metrics) and
# Loki (logs). Tail sampling on the trace path is what keeps the trace store
# small while always retaining the spans an operator actually wants to see:
# errors, slow runs, and a 5% baseline for everything else.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    # Kill the Collector before it OOMs the container. 80% of the soft limit
    # triggers GC; hitting `limit_mib` triggers a hard refusal.
    check_interval: 2s
    limit_mib: 512
    spike_limit_mib: 128

  batch:
    timeout: 5s
    send_batch_size: 1024

  # Strip the raw model input/output text from spans before they leave this
  # process. Hashing rather than dropping preserves the ability to confirm
  # "two calls had the same prompt" without ever storing the prompt itself.
  attributes/redact:
    actions:
      - key: llm.input_messages.0.message.content
        action: hash
      - key: llm.output_messages.0.message.content
        action: hash
      - key: input.value
        action: hash
      - key: output.value
        action: hash

  # Tail sampling: keep all errors, all slow runs, and 5% of baseline traffic.
  # `decision_wait` must be long enough for all spans of a trace to arrive at
  # the collector before the policy fires.
  tail_sampling:
    decision_wait: 10s
    num_traces: 50000
    expected_new_traces_per_sec: 50
    policies:
      - name: keep-errors
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: keep-slow
        type: latency
        latency:
          threshold_ms: 5000
      - name: baseline
        type: probabilistic
        probabilistic:
          sampling_percentage: 5

  # Logs need the trace_id promoted to a Loki label so derived-fields linking
  # in Grafana can find it. The agents already emit it inside the JSON body.
  resource:
    attributes:
      - key: deployment.environment
        value: local
        action: upsert

exporters:
  # Jaeger v2 speaks OTLP natively, so no jaeger-specific exporter needed.
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true
    # Resource attributes become Prometheus labels. Without this, every metric
    # would lack the service.name label and the dashboards would not split.
    resource_to_telemetry_conversion:
      enabled: true

  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  # Useful when debugging the collector itself. Disabled by default to keep
  # logs quiet; enable by adding `debug` to the exporters list of a pipeline.
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [memory_limiter, resource, attributes/redact, tail_sampling, batch]
      exporters:  [otlp/jaeger]
    metrics:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [prometheusremotewrite]
    logs:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [otlphttp/loki]
