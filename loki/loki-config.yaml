# Single-binary Loki, filesystem storage. Sized for a local demo, not for
# production retention.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory:  /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Loki's OTLP receiver lives at /otlp on the HTTP port. The collector pushes
# logs there as OTLP, and Loki promotes a small set of OTel resource
# attributes to indexed labels by default (service.name, service.namespace).
limits_config:
  allow_structured_metadata: true
  volume_enabled: true
  reject_old_samples: false
  retention_period: 168h

ruler:
  alertmanager_url: http://localhost:9093

analytics:
  reporting_enabled: false
